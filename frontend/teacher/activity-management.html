<!--
  CIE2-Activity-Management-System
  File: frontend/teacher/activity-management.html
  Purpose: Enables instructors to create activities, manage deadlines, assign marks, and configure quiz parameters.
  Scalability: Integrated form controls and modal hooks.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Management | CIE-2 Activity Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="dashboard-theme teacher-portal">

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>CIE-2 Instructor</h2>
      </div>
      <nav class="sidebar-menu">
        <a href="dashboard.html" class="menu-item" id="nav-dashboard">Dashboard</a>
        <a href="activity-management.html" class="menu-item active" id="nav-activities">Activity Management</a>
        <a href="evaluation.html" class="menu-item" id="nav-evaluation">Evaluation Portal</a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-badge teacher-badge">Teacher Mode</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1 id="page-title">Activity Management</h1>
        <div class="user-profile">
          <img src="../../uploads/profile-images/default-avatar.png" alt="Profile" class="profile-pic" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=teacher'">
          <span class="profile-name">Prof. Eleanor Vance</span>
        </div>
      </header>

      <div class="content-body">
        <!-- Activity Builder Form -->
        <div class="glass-card builder-section">
          <h2>Create New Activity / Quiz</h2>
          <form id="create-activity-form" class="form-grid">
            <div class="form-group">
              <label for="act-title">Title:</label>
              <input type="text" id="act-title" class="form-control" placeholder="e.g. Lab 4: Trees" required>
            </div>
            <div class="form-group">
              <label for="act-type">Category / Type:</label>
              <select id="act-type" class="form-control" required>
                <option value="lab">Lab Assignment</option>
                <option value="quiz">Quiz</option>
                <option value="exam">Term Exam</option>
              </select>
            </div>
            <div class="form-group">
              <label for="act-deadline">Deadline:</label>
              <input type="datetime-local" id="act-deadline" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="act-marks">Max Marks:</label>
              <input type="number" id="act-marks" class="form-control" min="1" max="100" placeholder="e.g. 20" required>
            </div>
            <div class="form-group full-width">
              <label for="act-desc">Description / Instructions:</label>
              <textarea id="act-desc" class="form-control" rows="3" placeholder="Provide instructions, guidelines, and reference links..." required></textarea>
            </div>
            <div class="form-group full-width text-right">
              <button type="submit" class="btn btn-primary">Publish Activity</button>
            </div>
          </form>
        </div>

        <!-- Managed Activities List -->
        <div class="glass-card table-section">
          <h2>Published Activities</h2>
          <table class="data-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Deadline</th>
                <th>Max Marks</th>
                <th>Submissions</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Data Structures Lab - Trees & Graphs</td>
                <td><span class="tag tag-lab">Lab Assignment</span></td>
                <td>Oct 24, 2026</td>
                <td>20</td>
                <td>24/30</td>
                <td>
                  <button class="btn btn-secondary btn-sm">Edit</button>
                  <button class="btn btn-danger btn-sm">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../shared/scripts.js"></script>
</body>
</html>
